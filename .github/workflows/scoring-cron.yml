name: Scoring Cron (IPL Match Window)

# Runs every 5 minutes during IPL match window:
# 10:00 - 18:59 UTC = 3:30 PM - 12:00 AM IST = 6:00 AM - 2:59 PM EDT
# Only during IPL season months (March, April, May)
on:
  schedule:
    - cron: '*/5 10-18 * 3-5 *'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  score:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call scoring endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PROD_URL: ${{ secrets.PROD_URL }}
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$PROD_URL/api/scoring/cron")

          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          echo "Status: $http_code"
          echo "Response: $body"

          if [ "$http_code" != "200" ]; then
            echo "::error::Scoring cron failed with status $http_code"
            exit 1
          fi
